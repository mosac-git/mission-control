<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Collective - Mission Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0e14;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 0;
            overflow-x: hidden;
        }

        #game-container {
            position: relative;
            width: 1280px;
            height: 720px;
            max-width: 100vw;
            image-rendering: pixelated;
            overflow: hidden;
            border: 2px solid #22d3ee33;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.1);
        }

        #game-container canvas {
            width: 100% !important;
            height: 100% !important;
            image-rendering: pixelated;
            object-fit: contain;
        }

        /* Loading overlay */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e14;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100000;
        }

        #loading-text {
            color: #22d3ee;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 12px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        #loading-progress-container {
            width: 300px;
            height: 12px;
            background: #1a1e2e;
            border: 1px solid #22d3ee44;
        }

        #loading-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #22d3ee, #a855f7);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* HQ title bar */
        #hq-header {
            width: 1280px;
            max-width: 100vw;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: #0d1117;
            border-bottom: 1px solid #22d3ee33;
        }

        #hq-title {
            color: #22d3ee;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        }

        #hq-status {
            color: #94a3b8;
            font-family: 'Courier New', monospace;
            font-size: 11px;
        }

        /* Agent roster bar */
        #agent-roster {
            width: 1280px;
            max-width: 100vw;
            background: #0d1117;
            border-top: 1px solid #22d3ee22;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            font-family: 'Courier New', monospace;
            font-size: 10px;
        }

        .roster-agent {
            padding: 2px 6px;
            border-radius: 2px;
            color: #94a3b8;
            background: #1a1e2e;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }

        .roster-agent.active {
            border-color: #22d3ee44;
            color: #e2e8f0;
        }

        .roster-agent.locked {
            opacity: 0.4;
            color: #666;
        }

        .roster-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div id="loading-overlay">
        <div id="loading-text">Initializing HQ systems...</div>
        <div id="loading-progress-container">
            <div id="loading-progress-bar"></div>
        </div>
    </div>

    <!-- HQ Header -->
    <div id="hq-header">
        <div id="hq-title">SHADOW COLLECTIVE // MISSION CONTROL</div>
        <div id="hq-status">SYSTEMS ONLINE</div>
    </div>

    <!-- Game canvas -->
    <div id="game-container"></div>

    <!-- Agent roster bar -->
    <div id="agent-roster" role="status" aria-label="Agent roster"></div>

    <!-- Phaser 3 -->
    <script src="/static/vendor/phaser-3.80.1.min.js"></script>
    <script src="/static/game.js"></script>

    <!-- Agent roster updater -->
    <script>
        // Build initial roster from agent config
        (function buildRoster() {
            var AGENTS = {
                shadow: { color: '#f59e0b', phase: 1 },
                nexus: { color: '#f59e0b', phase: 1 },
                forge: { color: '#ef4444', phase: 1 },
                warden: { color: '#ef4444', phase: 1 },
                stack: { color: '#ef4444', phase: 1 },
                atlas: { color: '#22d3ee', phase: 1 },
                ink: { color: '#22d3ee', phase: 1 },
                canvas: { color: '#a855f7', phase: 2 },
                ledger: { color: '#10b981', phase: 2 },
                wire: { color: '#3b82f6', phase: 2 },
                juris: { color: '#94a3b8', phase: 2 },
                diplomat: { color: '#3b82f6', phase: 2 },
                ryder: { color: '#f97316', phase: 2 },
                oracle: { color: '#22d3ee', phase: 3 },
                apex: { color: '#10b981', phase: 3 },
                foundry: { color: '#10b981', phase: 3 },
                merchant: { color: '#10b981', phase: 3 },
                harmony: { color: '#ec4899', phase: 4 },
                archive: { color: '#ec4899', phase: 4 },
            };

            var roster = document.getElementById('agent-roster');
            if (!roster) return;

            for (var name in AGENTS) {
                if (!AGENTS.hasOwnProperty(name)) continue;
                var cfg = AGENTS[name];
                var el = document.createElement('span');
                el.className = 'roster-agent';
                el.id = 'roster-' + name;

                var dot = document.createElement('span');
                dot.className = 'roster-dot';
                dot.style.background = cfg.color;
                el.appendChild(dot);

                var txt = document.createTextNode(name.toUpperCase());
                el.appendChild(txt);

                roster.appendChild(el);
            }

            // Poll state and update roster
            function updateRoster() {
                fetch('/status')
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (!data.agents) return;
                        var statusEl = document.getElementById('hq-status');
                        var activeCount = 0;

                        for (var name in AGENTS) {
                            if (!AGENTS.hasOwnProperty(name)) continue;
                            var rosterCfg = AGENTS[name];
                            var el = document.getElementById('roster-' + name);
                            if (!el) continue;
                            var agent = data.agents[name];
                            if (!agent) continue;

                            var isActive = agent.active !== false && agent.state !== 'locked';
                            el.className = 'roster-agent ' + (isActive ? 'active' : 'locked');

                            if (isActive) activeCount++;

                            // Update dot color based on state
                            var dotEl = el.querySelector('.roster-dot');
                            if (dotEl) {
                                if (!isActive) {
                                    dotEl.style.background = '#666';
                                } else if (agent.state === 'error') {
                                    dotEl.style.background = '#ef4444';
                                } else if (agent.state === 'idle' || agent.state === 'sleeping') {
                                    dotEl.style.background = '#94a3b8';
                                } else {
                                    dotEl.style.background = rosterCfg.color;
                                }
                            }
                        }

                        if (statusEl) {
                            statusEl.textContent = activeCount + '/19 AGENTS ONLINE';
                        }
                    })
                    .catch(function() {
                        var statusEl = document.getElementById('hq-status');
                        if (statusEl) statusEl.textContent = 'CONNECTION LOST';
                    });
            }

            setInterval(updateRoster, 3000);
            setTimeout(updateRoster, 1000);
        })();
    </script>
</body>
</html>
